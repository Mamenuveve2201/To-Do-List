<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable"h content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-tihtle" content="TASKS">
<meta name="theme-color" content="#07090f">
<title>TASKS</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--s1:#0b0e18;--s2:#0f1220;--s3:#131828;--s4:#181f33;
  --ln:#1a2238;--ln2:#222e4a;
  --g:#00e5a0;--gd:rgba(0,229,160,.1);--gh:rgba(0,229,160,.18);
  --r:#ff4d6d;--rd:rgba(255,77,109,.1);
  --a:#f59e0b;--ad:rgba(245,158,11,.1);
  --b:#4f8ef7;--bd:rgba(79,142,247,.1);
  --p:#a78bfa;--pd:rgba(167,139,250,.1);
  --tx:#dde4f5;--t2:#7a8aaa;--t3:#3a4a6a;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;overflow:hidden}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
#auth.hide{display:none}
.ab{background:var(--s2);border:1px solid var(--ln2);border-radius:18px;padding:32px;width:340px;max-width:100%}
.ab-icon{width:56px;height:56px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.ab-name{font-family:var(--mono);font-size:22px;letter-spacing:4px;color:var(--g);text-align:center}
.ab-tag{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:2px;text-align:center;margin-top:3px;margin-bottom:24px}
.atabs{display:flex;border-bottom:1px solid var(--ln);margin-bottom:18px}
.atab{font-family:var(--mono);font-size:10px;color:var(--t2);padding:7px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.atab.on{color:var(--g);border-bottom-color:var(--g)}
.aerr{background:var(--rd);border:1px solid rgba(255,77,109,.3);color:var(--r);padding:8px 11px;border-radius:8px;font-family:var(--mono);font-size:10px;margin-bottom:10px;display:none;line-height:1.5}
.aok{background:var(--gd);border:1px solid rgba(0,229,160,.2);color:var(--g);padding:8px 11px;border-radius:8px;font-family:var(--mono);font-size:10px;margin-bottom:10px;display:none;line-height:1.5}
.fl{display:block;font-family:var(--mono);font-size:8px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--ln2);color:var(--tx);padding:10px 12px;border-radius:8px;font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus{border-color:var(--g)}
.fg{margin-bottom:12px}
.btn{font-family:var(--sans);font-size:13px;font-weight:600;padding:10px 16px;border:1px solid var(--ln2);background:var(--s3);color:var(--tx);cursor:pointer;border-radius:8px;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--g);color:var(--g)}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--gd);border-color:var(--g);color:var(--g)}
.btn-g:hover{background:var(--gh)}
.btn-r{border-color:var(--r);color:var(--r)}
.btn-r:hover{background:var(--rd)}
.btn-full{width:100%;justify-content:center}

/* APP SHELL */
.app{display:flex;flex-direction:column;height:100vh;padding-top:var(--safe-top)}
.app.hide{display:none}

/* TOP BAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--ln);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-logo{font-family:var(--mono);font-size:14px;letter-spacing:3px;color:var(--g);font-weight:500}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--g);flex-shrink:0}
.sync-dot.busy{background:var(--a);animation:blink 1s infinite}
.sync-dot.err{background:var(--r)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--gd);border:1px solid var(--g);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--g);cursor:pointer;flex-shrink:0}

/* BOTTOM NAV */
.botnav{background:var(--s1);border-top:1px solid var(--ln);display:flex;padding-bottom:var(--safe-bot);flex-shrink:0}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;color:var(--t3);transition:color .15s;font-family:var(--mono);font-size:8px;letter-spacing:.5px;border-top:2px solid transparent}
.bni.on{color:var(--g);border-top-color:var(--g)}
.bni .ico{font-size:18px;line-height:1}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:16px 16px 20px;min-height:100%}
.page.on{display:block}

/* SECTION TITLE */
.stit{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.stit::after{content:'';flex:1;height:1px;background:var(--ln)}

/* STAT ROW */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:var(--s2);border:1px solid var(--ln);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc,var(--g))}
.stat-lbl{font-family:var(--mono);font-size:8px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
.green{color:var(--g)}.red{color:var(--r)}.amber{color:var(--a)}.blue{color:var(--b)}.purple{color:var(--p)}

/* FAB */
.fab{position:fixed;bottom:calc(70px + var(--safe-bot));right:16px;width:52px;height:52px;border-radius:50%;background:var(--g);color:#07090f;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,160,.4);border:none;transition:transform .15s;z-index:100;font-weight:300;line-height:1}
.fab:active{transform:scale(.92)}

/* TASK CARD */
.task-card{background:var(--s2);border:1px solid var(--ln);border-radius:12px;padding:13px 14px;margin-bottom:8px;transition:border-color .15s;position:relative}
.task-card.done{opacity:.5}
.task-card.done .task-title{text-decoration:line-through;color:var(--t2)}
.task-top{display:flex;align-items:flex-start;gap:10px}
.task-cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--ln2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.task-cb:hover{border-color:var(--g)}
.task-cb.done{background:var(--g);border-color:var(--g);color:#07090f;font-size:11px}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:600;line-height:1.4;word-break:break-word}
.task-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;align-items:center}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:8px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.tag-p-high{background:rgba(255,77,109,.15);color:var(--r);border:1px solid rgba(255,77,109,.3)}
.tag-p-med{background:rgba(245,158,11,.12);color:var(--a);border:1px solid rgba(245,158,11,.25)}
.tag-p-low{background:rgba(79,142,247,.12);color:var(--b);border:1px solid rgba(79,142,247,.25)}
.tag-cat{background:var(--s4);color:var(--t2);border:1px solid var(--ln2)}
.tag-due{font-family:var(--mono);font-size:8px}
.tag-due.overdue{color:var(--r)}
.tag-due.today{color:var(--a)}
.tag-due.soon{color:var(--g)}
.tag-due.later{color:var(--t2)}
.task-note{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.5}
.task-actions{display:flex;gap:5px;margin-top:8px}
.task-btn{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:4px;border:1px solid var(--ln2);background:transparent;color:var(--t2);cursor:pointer;transition:all .12s}
.task-btn:hover{border-color:var(--g);color:var(--g)}
.task-btn.del:hover{border-color:var(--r);color:var(--r)}

/* SUBTASKS */
.subtask-list{margin-top:8px;padding-top:8px;border-top:1px solid var(--ln)}
.sub-item{display:flex;align-items:center;gap:8px;padding:4px 0}
.sub-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--ln2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:9px}
.sub-cb:hover{border-color:var(--g)}
.sub-cb.done{background:var(--g);border-color:var(--g);color:#07090f}
.sub-txt{font-size:12px;flex:1;color:var(--t2)}
.sub-txt.done{text-decoration:line-through;color:var(--t3)}
.sub-del{font-size:10px;color:var(--t3);cursor:pointer;padding:2px 4px;border-radius:3px;background:transparent;border:none}
.sub-del:hover{color:var(--r)}

/* GOAL TABS */
.goal-tabs{display:flex;gap:0;overflow-x:auto;margin-bottom:14px;border-bottom:1px solid var(--ln);-webkit-overflow-scrolling:touch}
.goal-tabs::-webkit-scrollbar{display:none}
.gtab{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:9px 14px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.gtab.on{color:var(--g);border-bottom-color:var(--g)}
.gtab-count{display:inline-block;background:var(--s4);border-radius:8px;padding:1px 5px;font-size:7px;margin-left:4px;vertical-align:middle}
.gtab.on .gtab-count{background:var(--gd);color:var(--g)}

/* GOAL CARD */
.goal-card{background:var(--s2);border:1px solid var(--ln);border-radius:12px;padding:14px;margin-bottom:8px}
.goal-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.goal-em{font-size:24px;flex-shrink:0;line-height:1}
.goal-info{flex:1;min-width:0}
.goal-title{font-size:14px;font-weight:700}
.goal-period{font-family:var(--mono);font-size:8px;color:var(--t2);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.goal-pct{font-family:var(--mono);font-size:18px;font-weight:500;flex-shrink:0}
.pbar{height:5px;background:var(--s4);border-radius:4px;overflow:hidden;margin:6px 0}
.pfill{height:100%;border-radius:4px;transition:width .4s}
.goal-foot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--t2)}
.goal-tasks{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:5px}
.goal-actions{display:flex;gap:5px;margin-top:8px}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.mo.open{display:flex}
.md{background:var(--s2);border:1px solid var(--ln2);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.md-t{font-size:15px;font-weight:700;color:var(--g);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between}
.md-close{font-size:20px;color:var(--t2);cursor:pointer;background:none;border:none;padding:0;line-height:1}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--ln)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fs option{background:var(--s2)}
.sub-input-row{display:flex;gap:8px;margin-top:6px}
.sub-input-row .fi{flex:1}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.fpill{font-family:var(--mono);font-size:9px;padding:5px 10px;border-radius:20px;border:1px solid var(--ln2);background:var(--s3);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0}
.fpill.on{background:var(--gd);border-color:var(--g);color:var(--g)}
.fpill.red.on{background:var(--rd);border-color:var(--r);color:var(--r)}
.fpill.amber.on{background:var(--ad);border-color:var(--a);color:var(--a)}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-txt{font-family:var(--mono);font-size:9px;letter-spacing:1.5px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
.search-fi{padding-left:34px}

/* TOAST */
#toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(40px);background:var(--s3);border:1px solid var(--ln2);border-radius:10px;padding:9px 16px;font-family:var(--mono);font-size:11px;z-index:9999;transition:transform .25s,opacity .25s;opacity:0;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{border-color:var(--g);color:var(--g)}
#toast.err{border-color:var(--r);color:var(--r)}
#toast.warn{border-color:var(--a);color:var(--a)}

/* PROFILE SHEET */
.profile-sheet{background:var(--s2);border:1px solid var(--ln2);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-width:540px}
.prof-email{font-family:var(--mono);font-size:11px;color:var(--t2);margin-bottom:16px;word-break:break-all}

/* DIVIDER */
.div{height:1px;background:var(--ln);margin:16px 0}

@media(min-width:540px){
  .mo{align-items:center}
  .md,.profile-sheet{border-radius:16px;margin:0 auto;padding:24px}
  .fab{bottom:calc(80px + var(--safe-bot))}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="ab">
    <div class="ab-icon">&#10003;</div>
    <div class="ab-name">TASKS</div>
    <div class="ab-tag">// get things done</div>
    <div class="atabs">
      <div class="atab on" id="tab-in" onclick="aTab('in')">Sign In</div>
      <div class="atab" id="tab-up" onclick="aTab('up')">Create Account</div>
    </div>
    <div class="aerr" id="a-err"></div>
    <div class="aok" id="a-ok"></div>
    <div id="a-in">
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="in-em" placeholder="you@email.com" autocomplete="email"></div>
      <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="in-pw" placeholder="password" autocomplete="current-password"></div>
      <button class="btn btn-g btn-full" id="in-btn" onclick="doSignIn()">Sign In</button>
      <div style="text-align:center;margin:12px 0 8px;font-family:var(--mono);font-size:9px;color:var(--t3)">or sign in without a password</div>
      <input class="fi" type="email" id="ml-em" placeholder="your@email.com" autocomplete="email" style="margin-bottom:8px">
      <button class="btn btn-full" onclick="doMagic()">Send Magic Link</button>
    </div>
    <div id="a-up" style="display:none">
      <div style="background:var(--s3);border:1px solid var(--ln);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-family:var(--mono);font-size:9px;color:var(--t2);line-height:1.7">After signup, check your email to confirm your account, then sign in here.</div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="up-em" placeholder="you@email.com" autocomplete="email"></div>
      <div class="fg"><label class="fl">Password (min 6 chars)</label><input class="fi" type="password" id="up-pw" placeholder="password" autocomplete="new-password"></div>
      <button class="btn btn-g btn-full" id="up-btn" onclick="doSignUp()">Create Account</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<div class="app hide" id="app">

  <div class="topbar">
    <div class="topbar-logo">TASKS</div>
    <div class="topbar-right">
      <div class="sync-dot" id="sdot"></div>
      <div class="avatar" id="avatar-btn" onclick="openProfile()">M</div>
    </div>
  </div>

  <div class="content" id="content">

    <!-- TODAY PAGE -->
    <div class="page on" id="p-today">
      <div class="stats">
        <div class="stat" style="--acc:var(--g)"><div class="stat-lbl">Due Today</div><div class="stat-val green" id="s-today">0</div></div>
        <div class="stat" style="--acc:var(--r)"><div class="stat-lbl">Overdue</div><div class="stat-val red" id="s-overdue">0</div></div>
        <div class="stat" style="--acc:var(--a)"><div class="stat-lbl">This Week</div><div class="stat-val amber" id="s-week">0</div></div>
        <div class="stat" style="--acc:var(--b)"><div class="stat-lbl">Completed</div><div class="stat-val blue" id="s-done">0</div></div>
      </div>
      <div id="today-overdue"></div>
      <div id="today-today"></div>
      <div id="today-upcoming"></div>
    </div>

    <!-- ALL TASKS PAGE -->
    <div class="page" id="p-tasks">
      <div class="search-wrap">
        <div class="search-ico">&#128269;</div>
        <input class="fi search-fi" type="text" id="task-search" placeholder="Search tasks..." oninput="renderTasks()">
      </div>
      <div class="filter-bar" id="task-filters"></div>
      <div id="task-list"></div>
    </div>

    <!-- GOALS PAGE -->
    <div class="page" id="p-goals">
      <div class="goal-tabs" id="goal-tabs"></div>
      <div class="stats" id="goal-stats-row"></div>
      <div id="goals-list"></div>
    </div>

  <!-- HISTORY PAGE -->
    <div class="page" id="p-history">
      <div class="filter-bar" id="hist-filters"></div>
      <div class="stats" id="hist-stats"></div>
      <div id="hist-list"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="botnav">
    <div class="bni on" data-p="today" onclick="goPage('today')">
      <div class="ico">&#9788;</div>
      <div>Today</div>
    </div>
    <div class="bni" data-p="tasks" onclick="goPage('tasks')">
      <div class="ico">&#9776;</div>
      <div>All Tasks</div>
    </div>
    <div class="bni" data-p="goals" onclick="goPage('goals')">
      <div class="ico">&#9654;</div>
      <div>Goals</div>
    </div>
    <div class="bni" data-p="history" onclick="goPage('history')">
      <div class="ico">&#9710;</div>
      <div>History</div>
    </div>
  </nav>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="fabClick()">+</button>

</div>

<!-- PROFILE SHEET -->
<div class="mo" id="mo-profile"><div class="profile-sheet">
  <div class="md-t">Profile <button class="md-close" onclick="closeMo('profile')">&#10005;</button></div>
  <div class="prof-email" id="prof-email"></div>
  <button class="btn btn-full" style="margin-bottom:8px" onclick="closeMo('profile')">Close</button>
  <button class="btn btn-r btn-full" onclick="doSignOut()">Sign Out</button>
</div></div>

<!-- TASK MODAL -->
<div class="mo" id="mo-task"><div class="md">
  <div class="md-t" id="task-modal-title">New Task <button class="md-close" onclick="closeMo('task')">&#10005;</button></div>
  <input type="hidden" id="task-eid">
  <div class="fg"><label class="fl">Title</label><input class="fi" type="text" id="t-title" placeholder="What needs to be done?"></div>
  <div class="fg"><label class="fl">Notes</label><textarea class="fi" id="t-notes" rows="2" placeholder="Optional notes..." style="resize:none"></textarea></div>
  <div class="fr">
    <div class="fg"><label class="fl">Priority</label>
      <select class="fs" id="t-priority">
        <option value="none">None</option>
        <option value="low">Low</option>
        <option value="med">Medium</option>
        <option value="high">High</option>
      </select>
    </div>

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function pad(n) { return String(n).padStart(2,'0'); }
function today() { var d = new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmt(dt) {
  if (!dt) return '';
  var t = today(), d = new Date(dt+'T00:00:00'), now = new Date(t+'T00:00:00');
  var diff = Math.round((d-now)/(1000*60*60*24));
  if (diff < -1) return (Math.abs(diff))+'d overdue';
  if (diff === -1) return 'Yesterday';
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff <= 7) return 'In '+diff+'d';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function dueCls(dt) {
  if (!dt) return 'later';
  var t = today(), d = new Date(dt+'T00:00:00'), now = new Date(t+'T00:00:00');
  var diff = Math.round((d-now)/(1000*60*60*24));
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'today';
  if (diff <= 3) return 'soon';
  return 'later';
}
function weekEnd() {
  var d = new Date(); d.setDate(d.getDate()+(6-d.getDay())); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

// Sync
var realtimeChannel = null;
var lastPushedAt = 0;

function saveLocal() { try { localStorage.setItem(LK, JSON.stringify(D)); } catch(e){} }
function loadLocal() {
  try { var r = localStorage.getItem(LK); if (!r) return false; var d = JSON.parse(r); D.tasks = d.tasks||[]; D.goals = d.goals||[]; return true; } catch(e) { return false; }
}
function dataCount() { return D.tasks.length + D.goals.length; }
function setSyncUI(st) {
  var el = document.getElementById('sdot');
  el.className = 'sync-dot ' + (st==='busy'?'busy':st==='err'?'err':'');
}

function mergeFromCloud(cloudData) {
  if (!cloudData) return false;
  var cloudTasks = cloudData.tasks || [];
  var cloudGoals = cloudData.goals || [];
  // Merge strategy: cloud wins for newer completedAt, local wins for new items not in cloud
  var taskMap = {};
  D.tasks.forEach(function(t){ taskMap[t.id] = t; });
  cloudTasks.forEach(function(ct) {
    var local = taskMap[ct.id];
    if (!local) { taskMap[ct.id] = ct; }
    else {
      // Cloud wins if it has a newer completedAt or was completed and local wasn't
      if (ct.done && !local.done) taskMap[ct.id] = ct;
      else if (!ct.done && local.done) {} // keep local
      else if ((ct.completedAt||'') > (local.completedAt||'')) taskMap[ct.id] = ct;
    }
  });
  var goalMap = {};
  D.goals.forEach(function(g){ goalMap[g.id] = g; });
  cloudGoals.forEach(function(cg){ if (!goalMap[cg.id]) goalMap[cg.id] = cg; });
  D.tasks = Object.keys(taskMap).map(function(k){ return taskMap[k]; });
  D.goals = Object.keys(goalMap).map(function(k){ return goalMap[k]; });
  return true;
}

function pushCloud() {
  if (!ME || isSaving) return;
  isSaving = true; setSyncUI('busy');
  lastPushedAt = Date.now();
  SB.from('user_data').upsert(
    { id: ME.id, data: JSON.parse(JSON.stringify(D)), updated_at: new Date().toISOString() },
    { onConflict: 'id' }
  ).then(function(res) {
    setSyncUI(res.error ? 'err' : 'ok');
    if (res.error) toast('Sync failed - saved locally', 'err');
    isSaving = false;
  });
}

function pullCloud(silent) {
  if (!ME) return;
  if (!silent) setSyncUI('busy');
  SB.from('user_data').select('data,updated_at').eq('id', ME.id).single()
    .then(function(res) {
      if (res.data && res.data.data) {
        var merged = mergeFromCloud(res.data.data);
        if (merged) { saveLocal(); renderAll(); }
      } else if (dataCount() > 0) {
        pushCloud(); return;
      }
      setSyncUI('ok');
    })
    .catch(function() { setSyncUI('ok'); });
}

function setupRealtime() {
  if (realtimeChannel) { SB.removeChannel(realtimeChannel); realtimeChannel = null; }
  if (!ME) return;
  realtimeChannel = SB.channel('user_data_changes')
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'user_data',
      filter: 'id=eq.' + ME.id
    }, function(payload) {
      // Ignore if we just pushed (within 3 seconds) to avoid echo
      if (Date.now() - lastPushedAt < 3000) return;
      if (payload.new && payload.new.data) {
        mergeFromCloud(payload.new.data);
        saveLocal(); renderAll();
        toast('Synced from another device', 'ok');
      }
    })h
    .subscribe();
}

function onChange() {
  saveLocal();
  setSyncUI('busy');
  clearTimeout(saveT);
  saveT = setTimeout(pushCloud, 600);
}

}, 60000);

}

function renderToday() {
  var t = today(), we = weekEnd();
  var open = D.tasks.filter(function(x){return !x.done;});
  var overdue = open.filter(function(x){return x.due && x.due < t;});
  var dueToday = open.filter(function(x){return x.due===t;});
  var thisWeek = open.filter(function(x){return x.due && x.due>t && x.due<=we;});
  var doneCnt = D.tasks.filter(function(x){return x.done;}).length;
  document.getElementById('s-today').textContent = dueToday.length;
  document.getElementById('s-overdue').textContent = overdue.length;
  document.getElementById('s-week').textContent = thisWeek.length;
  document.getElementById('s-done').textContent = doneCnt;

  var ovEl = document.getElementById('today-overdue');
  var toEl = document.getElementById('today-today');
  var upEl = document.getElementById('today-upcoming');

  if (overdue.length) {
    ovEl.innerHTML = '<div class="stit">Overdue</div>' + overdue.map(taskCardHTML).join('');
  } else { ovEl.innerHTML = ''; }

  if (dueToday.length) {
    toEl.innerHTML = '<div class="stit">Due Today</div>' + dueToday.map(taskCardHTML).join('');
  } else {
    toEl.innerHTML = '<div class="stit">Due Today</div><div class="empty"><div class="empty-ico">&#10003;</div><div class="empty-txt">Nothing due today</div></div>';
  }

  if (thisWeek.length) {
    upEl.innerHTML = '<div class="stit">Coming This Week</div>' + thisWeek.map(taskCardHTML).join('');
  } else { upEl.innerHTML = ''; }
}

function renderTasks() {
  var cats = [];
  D.tasks.forEach(function(t){ if(t.cat&&cats.indexOf(t.cat)<0) cats.push(t.cat); });
  var fb = document.getElementById('task-filters');
  fb.innerHTML = '<div class="fpill'+(taskFilter.done==='open'?' on':'')+'" onclick="setFilter(\'done\',\'open\')">Open</div>'
    + '<div class="fpill'+(taskFilter.done==='done'?' on':'')+'" onclick="setFilter(\'done\',\'done\')">Done</div>'
    + '<div class="fpill'+(taskFilter.done==='all'?' on':'')+'" onclick="setFilter(\'done\',\'all\')">All</div>'
    + '<div class="fpill red'+(taskFilter.priority==='high'?' on':'')+'" onclick="setFilter(\'priority\',\'high\')">High</div>'
    + '<div class="fpill amber'+(taskFilter.priority==='med'?' on':'')+'" onclick="setFilter(\'priority\',\'med\')">Med</div>'
    + '<div class="fpill'+(taskFilter.priority==='low'?' on':'')+'" onclick="setFilter(\'priority\',\'low\')">Low</div>'
    + cats.map(function(c){ return '<div class="fpill'+(taskFilter.cat===c?' on':'')+'" onclick="setFilter(\'cat\',\''+esc(c)+'\')">'+esc(c)+'</div>'; }).join('');

  var q = (document.getElementById('task-search').value||'').toLowerCase();
  var list = D.tasks.slice().sort(function(a,b) {
    var ad = a.due||'9999-99-99', bd = b.due||'9999-99-99';
    return ad.localeCompare(bd);
  });
  if (taskFilter.done==='open') list = list.filter(function(t){return !t.done;});
  else if (taskFilter.done==='done') list = list.filter(function(t){return t.done;});
  if (taskFilter.priority) list = list.filter(function(t){return t.priority===taskFilter.priority;});
  if (taskFilter.cat) list = list.filter(function(t){return t.cat===taskFilter.cat;});
  if (q) list = list.filter(function(t){return (t.title||'').toLowerCase().indexOf(q)>=0||(t.notes||'').toLowerCase().indexOf(q)>=0||(t.cat||'').toLowerCase().indexOf(q)>=0;});
  var el = document.getElementById('task-list');
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-ico">&#9776;</div><div class="empty-txt">No tasks found</div></div>'; }
  else el.innerHTML = list.map(taskCardHTML).join('');
}
function setFilter(key, val) {
  if (taskFilter[key]===val) taskFilter[key]=''; else taskFilter[key]=val;
  renderTasks();
}

function renderGoals() {
  var PERIODS = ['day','week','month','quarter','year','custom'];
  var LABELS = {day:'Daily',week:'Weekly',month:'Monthly',quarter:'Quarterly',year:'Yearly',custom:'Custom'};

  // Render tabs
  var tabsEl = document.getElementById('goal-tabs');
  tabsEl.innerHTML = PERIODS.map(function(p) {
    var cnt = D.goals.filter(function(g){ return (g.period||'month')===p && !g.done; }).length;
    return '<div class="gtab'+(goalTab===p?' on':'')+'" data-p="'+p+'" onclick="setGoalTab(this.dataset.p)">'
      + LABELS[p]
      + '<span class="gtab-count">'+cnt+'</span>'
      + '</div>';
  }).join('');

  // Stats for current tab
  var tabGoals = D.goals.filter(function(g){ return (g.period||'month')===goalTab; });
  var activeTab = tabGoals.filter(function(g){ return !g.done; }).length;
  var doneTab = tabGoals.filter(function(g){ return g.done; }).length;
  var statsEl = document.getElementById('goal-stats-row');
  statsEl.innerHTML = '<div class="stat" style="--acc:var(--g)"><div class="stat-lbl">Active</div><div class="stat-val green">'+activeTab+'</div></div>'
    + '<div class="stat" style="--acc:var(--b)"><div class="stat-lbl">Completed</div><div class="stat-val blue">'+doneTab+'</div></div>';

  var el = document.getElementById('goals-list');
  if (!tabGoals.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">&#9654;</div><div class="empty-txt">No '+LABELS[goalTab].toLowerCase()+' goals yet</div></div>';
    return;
  }

  el.innerHTML = tabGoals.map(function(g) {
    var linked = D.tasks.filter(function(t){ return t.goalId===g.id; });
    var doneTasks = linked.filter(function(t){ return t.done; }).length;
    var pct = linked.length ? Math.round((doneTasks/linked.length)*100) : 0;
    var barCol = pct>=100?'var(--g)':pct>=50?'var(--b)':'var(--a)';
    var dl = g.date ? Math.ceil((new Date(g.date+'T00:00:00')-new Date())/(1000*60*60*24)) : null;
    var dlTxt = dl!=null ? (dl>0?dl+'d left':(dl===0?'Due today':'Overdue')) : '';
    var doneClass = g.done ? ' done' : '';
    var h = [];
    h.push('<div class="goal-card'+doneClass+'">');
    h.push('<div class="goal-header">');
    h.push('<div class="goal-em">'+(g.emoji||'*')+'</div>');
    h.push('<div class="goal-info">');
    h.push('<div class="goal-title">'+(g.title ? esc(g.title) : '<span style="color:var(--t3)">Untitled Goal</span>')+'</div>');
    if (g.desc) h.push('<div style="font-size:12px;color:var(--t2);margin-top:3px">'+esc(g.desc)+'</div>');
    if (dlTxt) h.push('<div class="goal-period">'+dlTxt+'</div>');
    h.push('</div>');
    h.push('<div class="goal-pct" style="color:'+barCol+'">'+pct+'%</div>');
    h.push('</div>');
    h.push('<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+barCol+'"></div></div>');
    h.push('<div class="goal-foot"><span>'+doneTasks+' / '+linked.length+' tasks</span>'+(dlTxt?'<span style="color:'+(dl<0?'var(--r)':dl===0?'var(--a)':'var(--t2)')+'">'+dlTxt+'</span>':'')+'</div>');
    h.push('<div class="goal-actions">');
    h.push('<button class="task-btn" data-gid="'+g.id+'" onclick="addTaskForGoal(this.dataset.gid)">+ Task</button>');
    h.push('<button class="task-btn" data-id="'+g.id+'" onclick="openGoalModal(this.dataset.id)">Edit</button>');
    h.push('<button class="task-btn" data-id="'+g.id+'" onclick="toggleGoal(this.dataset.id)">'+(g.done?'Reopen':'Complete')+'</button>');
    h.push('<button class="task-btn del" data-id="'+g.id+'" onclick="delGoal(this.dataset.id)">Delete</button>');
    h.push('</div></div>');
    return h.join('');
  }).join('');
}
function setGoalTab(p) { goalTab = p; renderGoals(); }

function addTaskForGoal(gid) {
  openTaskModal(null);
  setTimeout(function(){
    var sel = document.getElementById('t-goal');
    if (sel) sel.value = gid;
  }, 250);
}

function renderHistory() {
  var now = new Date();
  var t = today();
  var dayStart = t;
  var weekStart = (function(){
    var d = new Date(now); d.setDate(d.getDate()-6);
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  })();
  var monthStart = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-01';
  var yearStart = now.getFullYear()+'-01-01';
  var ranges = {day:dayStart, week:weekStart, month:monthStart, year:yearStart, all:'0000-00-00'};
  var labels = {day:'Today', week:'Last 7 Days', month:'This Month', year:'This Year', all:'All Time'};
  var fb = document.getElementById('hist-filters');
  fb.innerHTML = ['day','week','month','year','all'].map(function(k){
    return '<div class="fpill'+(histFilter===k?' on':'')+'" onclick="setHistFilter(\''+k+'\')">'+labels[k]+'</div>';
  }).join('');
  var from = ranges[histFilter];
  var done = D.tasks.filter(function(t){
    return t.done && t.completedAt && t.completedAt >= from;
  }).slice().sort(function(a,b){ return (b.completedAt||'').localeCompare(a.completedAt||''); });
  var highDone = done.filter(function(t){return t.priority==='high';}).length;
  var statsEl = document.getElementById('hist-stats');
  statsEl.innerHTML = '<div class="stat" style="--acc:var(--g)"><div class="stat-lbl">Completed</div><div class="stat-val green">'+done.length+'</div></div>'
    + '<div class="stat" style="--acc:var(--r)"><div class="stat-lbl">High Priority</div><div class="stat-val red">'+highDone+'</div></div>';
  var el = document.getElementById('hist-list');
  if (!done.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">&#10003;</div><div class="empty-txt">No completed tasks for this period</div></div>';
    return;
  }
  var groups = {};
  done.forEach(function(t){
    var d = t.completedAt||'Unknown';
    if (!groups[d]) groups[d] = [];
    groups[d].push(t);
  });
  var html = '';
  Object.keys(groups).sort().reverse().forEach(function(date) {
    var lbl = date===t?'Today':date===yesterday()?'Yesterday':date;
    html += '<div class="stit">'+lbl+' ('+groups[date].length+')</div>';
    html += groups[date].map(function(task) {
      var pcls = task.priority==='high'?'tag-p-high':task.priority==='med'?'tag-p-med':task.priority==='low'?'tag-p-low':'';
      var plbl = task.priority==='high'?'High':task.priority==='med'?'Medium':task.priority==='low'?'Low':'';
      var doneSubs = (task.subtasks||[]).filter(function(s){return s.done;}).length;
      var totalSubs = (task.subtasks||[]).length;
      var hc = [];
      hc.push('<div class="task-card done">');
      hc.push('<div class="task-top">');
      hc.push('<div class="task-cb done">v</div>');
      hc.push('<div class="task-body">');
      hc.push('<div class="task-title">'+esc(task.title)+'</div>');
      if (task.notes) hc.push('<div class="task-note">'+esc(task.notes)+'</div>');
      hc.push('<div class="task-meta">');
      if (plbl) hc.push('<span class="tag '+pcls+'">'+plbl+'</span>');
      if (task.cat) hc.push('<span class="tag tag-cat">'+esc(task.cat)+'</span>');
      if (totalSubs>0) hc.push('<span class="tag tag-cat">'+doneSubs+'/'+totalSubs+' subtasks</span>');
      hc.push('</div>');
      hc.push('<div class="task-actions">');
      hc.push('<button class="task-btn" data-id="'+task.id+'" onclick="reopenTask(this.dataset.id)">Reopen</button>');
      hc.push('</div></div></div></div>');
      return hc.join('');
    }).join('');
  });
  el.innerHTML = html;
}
function setHistFilter(f) { histFilter=f; renderHistory(); }
function yesterday() {
  var d = new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function reopenTask(id) {
  var t = D.tasks.find(function(x){return x.id===id;}); if(!t) return;
  t.done = false; delete t.completedAt;
  onChange(); renderAll(); toast('Task reopened');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
